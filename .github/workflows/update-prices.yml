name: Update Investment Prices

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'   # tiap 6 jam: 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:                # bisa trigger manual juga dari GitHub Actions tab

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch latest prices
        run: python fetch_prices.py

      - name: Commit & push prices.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git diff --staged --quiet || git commit -m "chore: auto-update prices $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
